<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Arial; }
    .twitter-container { width:100%; max-width:550px; margin: 0 auto; padding: 10px 0; }
  </style>
</head>
<body>
  <div class="twitter-container" id="feed"></div>

  <script>
    async function run() {
      const res = await fetch('./posts.json', { cache: 'no-store' });
      const urls = await res.json();

      const feed = document.getElementById('feed');
      feed.innerHTML = urls.map(u => `
        <blockquote class="twitter-tweet" data-dnt="true">
          <a href="${u}"></a>
        </blockquote>
      `).join('\n');

      const s = document.createElement('script');
      s.async = true;
      s.src = "https://platform.twitter.com/widgets.js";
      s.charset = "utf-8";
      document.body.appendChild(s);
    }
    run();
  </script>
</body>
</html>
